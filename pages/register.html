<main class="register-container">
  <h1>Crear cuenta</h1>

  <form>
    <label for="name">Nombre completo</label>
    <input type="text" id="name" required />

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" required />

    <label for="pass">Contraseña</label>
    <input type="password" id="pass" minlength="6" required />

    <label for="pass2">Repetir contraseña</label>
    <input type="password" id="pass2" minlength="6" required />

    <label for="birth">Fecha de nacimiento</label>
    <input type="date" id="birth" required />

    <label for="province">Provincia / País</label>
    <select id="province" required>
      <option value="">Seleccionar...</option>
      <option>Buenos Aires</option>
      <option>Córdoba</option>
      <option>Mendoza</option>
      <option>Santa Fe</option>
      <option>Neuquén</option>
    </select>

    <label for="obs">Observación (opcional)</label>
    <textarea id="obs"></textarea>

    <button class="btn-primary">Registrarme</button>
  </form>
</main>

  <footer class="footer">
    <div class="footer-col">
      <img src="../assets/images/logo.png" class="footer-logo">

      <p>📞 +1 305 555 1234</p>
      <p>📍 New York, USA</p>
    </div>
  </footer>

</body>
