<body>

<header class="navbar">
  <div class="nav-container">

<main class="contact-container">
  <h1>Contacto</h1>

  <section class="contact-form">
    <h2>Envíanos un mensaje</h2>
    <form>
      <label for="name">Nombre completo</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Mensaje</label>
      <textarea id="message" name="message" minlength="20" maxlength="1000" required></textarea>

      <button type="submit" class="btn-primary">Enviar</button>
    </form>
  </section>

  <section class="contact-map">
    <h2>Nuestra ubicación</h2>
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3021.903728379575!2d-73.98513068459303!3d40.75889697932639!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25855d3f8b7f7%3A0xbbb6d6f74a09a1e!2sTimes%20Square!5e0!3m2!1ses!2sus!4v1700000000000"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </div>
  </section>
</main>

<footer class="footer">
    <div class="footer-col">
      <img src="../assets/images/logo.png" class="footer-logo">
      <p>Urban Plant Cookies ®</p>
    </div>

    <div class="footer-col">
      <h4>Redes</h4>
      <a href="https://www.linkedin.com/in/catalina-imas-378a73318/?skipRedirect=true" target="_blank">LinkedIn</a>
      <a href="https://facebook.com" target="_blank">Facebook</a>
      <a href="https://twitter.com" target="_blank">Twitter</a>
    </div>

    <div class="footer-col">
      <h4>Contacto</h4>
      <p>📧 info@urbanplantcookies.com</p>
      <p>📞 +1 305 555 1234</p>
      <p>📍 New York, USA</p>
    </div>
  </footer>


</body>
</html>
